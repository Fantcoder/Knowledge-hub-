# Server
server.port=8080

# Datasource (MySQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/knowledgehub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.default_batch_fetch_size=100
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.open-in-view=false

# JWT
# No default — app will refuse to start if JWT_SECRET is missing
jwt.secret=${JWT_SECRET}
jwt.access-expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Google Auth
google.client.id=${GOOGLE_CLIENT_ID:}

# File Upload Limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Web - Network Compression
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024
file.upload-dir=${FILE_UPLOAD_DIR:./uploads}

# CORS
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Logging
logging.level.com.knowledgehub=INFO
logging.level.org.springframework.security=WARN

# Actuator (optional)
management.endpoints.web.exposure.include=health,info

# Flyway Database Migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Pagination defaults
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# AI Configuration (Groq LPU Engine)
ai.api-key=${AI_API_KEY:}
ai.base-url=${AI_BASE_URL:https://api.groq.com/openai/v1}
ai.chat-model=${AI_CHAT_MODEL:llama-3.3-70b-versatile}
