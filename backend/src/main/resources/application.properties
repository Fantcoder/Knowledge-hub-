# Server
server.port=8080

# Datasource (MySQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/knowledgehub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=false

# JWT
# No default — app will refuse to start if JWT_SECRET is missing
jwt.secret=${JWT_SECRET}
jwt.access-expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=15MB
file.upload-dir=${FILE_UPLOAD_DIR:./uploads}

# CORS
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Logging
logging.level.com.knowledgehub=INFO
logging.level.org.springframework.security=WARN

# Actuator (optional)
management.endpoints.web.exposure.include=health,info

# Flyway Database Migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Pagination defaults
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# OpenAI AI Configuration
openai.api-key=${OPENAI_API_KEY:}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
openai.embedding-model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
openai.chat-model=${OPENAI_CHAT_MODEL:gpt-4o-mini}
