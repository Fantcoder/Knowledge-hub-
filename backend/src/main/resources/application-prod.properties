# =====================================================
# PRODUCTION CONFIG
# Activate via: SPRING_PROFILES_ACTIVE=prod
# All values come from environment variables
# =====================================================

# Disable devtools reload
spring.devtools.restart.enabled=false

# Tighter JPA — DO NOT use ddl-auto=update in production
# Use Flyway or Liquibase migrations instead
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Logging — less verbose
logging.level.root=WARN
logging.level.com.knowledgehub=INFO
