# =====================================================
# PRODUCTION CONFIG — Render + Railway MySQL
# Activated via: SPRING_PROFILES_ACTIVE=prod
# All values come from Render environment variables
# =====================================================

# Database — Railway MySQL (overridden by Render env vars)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA — strict mode for production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Connection pool tuning for Railway free tier
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# Disable devtools
spring.devtools.restart.enabled=false

# Logging
logging.level.root=WARN
logging.level.com.knowledgehub=INFO
