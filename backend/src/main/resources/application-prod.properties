# =====================================================
# PRODUCTION CONFIG — Render + Railway MySQL
# Activated via: SPRING_PROFILES_ACTIVE=prod
# All values come from Render environment variables
# =====================================================

# Database — Railway MySQL (overridden by Render env vars)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA — Flyway handles all schema changes; Hibernate should not touch schema
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# Connection pool tuning for Railway free tier
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=45000

# Disable devtools
spring.devtools.restart.enabled=false

# Logging
logging.level.root=WARN
logging.level.com.knowledgehub=INFO

# Web - Network Compression
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024
